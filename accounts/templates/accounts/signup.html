{% extends "base.html" %}

{% block title %}Sign Up{% endblock title %}

{% block content %}
  <section class="auth-panel">
    <div class="section-heading">
      <div>
        <p class="eyebrow">New Account</p>
        <h1>Create an account</h1>
        <p class="meta-text">Choose a role, set your login details, and start using the newsroom.</p>
      </div>
    </div>

    <form method="post" class="form-panel">
      {% csrf_token %}
      {{ form.as_p }}
      <div class="button-row">
        <button type="submit">Create Account</button>
        <a class="button secondary-button" href="{% url 'accounts:login' %}">Back to Login</a>
      </div>
    </form>
  </section>
{% endblock content %}
