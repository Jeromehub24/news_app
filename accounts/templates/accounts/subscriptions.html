{% extends "base.html" %}

{% block title %}Subscriptions{% endblock title %}

{% block content %}
  <section class="auth-panel">
    <div class="section-heading">
      <div>
        <p class="eyebrow">Reader Feed</p>
        <h1>Manage subscriptions</h1>
        <p class="meta-text">
          Choose the publishers and journalists that should appear in your feed.
        </p>
      </div>
    </div>

    <form method="post" class="form-panel">
      {% csrf_token %}
      {{ form.as_p }}
      <div class="button-row">
        <button type="submit">Save Subscriptions</button>
        <a class="button secondary-button" href="{% url 'accounts:dashboard' %}">
          Back to Dashboard
        </a>
      </div>
    </form>
  </section>
{% endblock content %}
